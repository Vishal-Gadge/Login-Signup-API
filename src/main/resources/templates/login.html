<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <section>
        <form action="/req/login/verify" method="post">
        <h1>Log in</h1>
            <div class="inputbox">
                <ion-icon name="mail-outline"></ion-icon>
                <input type="email" id="email" required>
                <label for="">Email</label>
            </div>
            <div class="inputbox">
                <ion-icon name="lock-closed-outline"></ion-icon>
                <input type="password" id="password" required>
                <label for="">Password</label>
            </div>
            <div class="register">
                <p><a href="/html/forgotPass.html">Forgot Password ?</a></p>
            </div>
            <button id="loginBtn">Log in</button>
            <div class="register">
                <p>Don't have an account? <a href="/req/signup"> Sign up</a></p>
            </div>
        </form>
    </section>
    <script src="/js/styleJs.js" defer></script>
    <script src="/js/login.js"></script>
</body>
</html>
