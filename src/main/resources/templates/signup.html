<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<section>
    <form action="/req/signup/save" method="POST">
        <h1>Sign Up</h1>
        <div class="inputbox">
            <ion-icon name="person-outline"></ion-icon>
            <input type="text" name="name" id="name" required>
            <label for="">Name</label>
        </div>
        <div class="inputbox">
            <ion-icon name="mail-outline"></ion-icon>
            <input type="email" name="email" id="email" required>
            <label for="">Email</label>
        </div>
        <div class="inputbox">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <input type="password" name="password" id="password" required>
            <label for="">Password</label>
        </div>
        <div class="inputbox">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <input type="password" name="confirmPassword" id="confirmPassword" required>
            <label for="">Confirm Password</label>
        </div>

        <div id="showResult" style="display: none; color: red; margin-bottom: 7px;"></div>
        
        <button id="signupBtn" type="submit">
            <span id="signupBtnText">Sign up</span>
            <span id="signupSpinner" style="display: none;">⏳</span>
        </button>
        
        <div class="register" id="bottomDiv">
            <p style="margin-top: 5px;">Already have an account? <a href="login.html"> Log In</a></p>
            <p style="margin-top: 5px;">Email not verified? <a href="/html/resend-verification.html"> Verify Email</a></p>
        </div>
    </form>
</section>
<script src="/js/signup.js"></script>
</body>
</html>
