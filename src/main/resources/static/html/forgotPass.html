<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot password</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<section>
    <form id="forgotPassForm">
        <div id="step1">
            <h1>Forgot Password</h1>
            <div class="inputbox">
                <ion-icon name="mail-outline"></ion-icon>
                <input type="email" id="email">
                <label for="">Enter email</label>
            </div>
            <div class="inputbox">
                <ion-icon name="lock-closed-outline"></ion-icon>
                <input type="password" id="password">
                <label for="">Enter Password</label>
            </div>
            <div class="inputbox">
                <ion-icon name="lock-closed-outline"></ion-icon>
                <input type="password" id="confirmPass">
                <label for="">Confirm password</label>
            </div>
        
            <button id="forgotPassBtn" type="button">
                <span id="forgotPassText">Send OTP</span>
                <span id="forgotPassSpinner" style="display: none;">⏳</span>
            </button>
        </div>

        <div id="step2" style="display: none;">
            <h1>Verify OTP</h1>
            <div class="inputbox">
                <ion-icon name="lock-closed-outline"></ion-icon>
                <input type="number" id="forgotPassOtp">
                <label for="">Enter OTP</label>
            </div>
            <button id="changePassBtn" type="button">
                <span id="changePassText">Change Password</span>
                <span id="changePassSpinner" style="display: none;">⏳</span>
            </button>
        </div>
        <br>
        <div id="showResult" style="display: none;"></div>
    </form>
</section>
<script src="/js/forgotPass.js"></script>
</body>
</html>
