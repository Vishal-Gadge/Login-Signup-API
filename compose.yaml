services:

 # docker run -d --name redis -p 6379:6379 -v loginregister_redis_data:/data 6ab0b6e73817 redis-server --appendonly yes
  redis:
    image: redis:7-alpine
    ports:
    - 6379:6379
    volumes:
    - redis_data:/data
    command: redis-server --appendonly yes

  mysql:
    image: mysql:8.0
    ports:
      - "4444:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      MYSQL_DATABASE: security
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
    depends_on:
      - mysql
      - redisContainer

volumes:
  mysql_data:
  redis_data: